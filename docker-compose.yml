services:

  mosquitto:
    image: eclipse-mosquitto:2.0.11
    container_name: mosquitto
    restart: always
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    ports:
      - "${MQTT_PORT}:1883"
      - "${WS_PORT}:9001"
    networks:
      - iot_network

  nestjs-app:
    build: .
    container_name: nestjs-app
    environment:
      - NODE_ENV=${NODE_ENV}
      - JWT_AT_SECRET=${JWT_AT_SECRET}
      - JWT_RT_SECRET=${JWT_RT_SECRET}
      - DATABASE_URL=${DB_HOST}
    ports:
      - "${APP_PORT}:3333"
    depends_on:
      - mosquitto
      - mariadb
      - postgres
    networks:
      - iot_network
    restart: always

  mariadb:
    image: mariadb:10
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD="${ROOT_DBPASS}"
      - MYSQL_DATABASE=mqtt
      - MYSQL_USER=prisma
      - MYSQL_PASSWORD=prisma
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh", "--connect"]
      interval: 5s
      timeout: 2s
      retries: 20
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./error.log:/var/log/mysql/error.log
    networks:
      - iot_network

  postgres:
      image: postgres:alpine
      container_name: postgres
      ports:
        - '5432:5432'
      restart: always
      volumes:
        - pg-data:/var/lib/postgresql/data
      environment:
        POSTGRES_USER: pguser
        POSTGRES_PASSWORD: pgpassword

  nginx-proxy:
    image: nginx:latest
    container_name: nginx-proxy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - nestjs-app
      - mariadb
      - mosquitto
    networks:
      - iot_network

  fail2ban:
    image: lscr.io/linuxserver/fail2ban:latest
    container_name: fail2ban
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./fail2ban/config:/config
      - /var/log:/var/log:ro
    restart: unless-stopped

networks:
  iot_network:
    driver: bridge

volumes:
  mariadb-data: {}
  pg-data: {}